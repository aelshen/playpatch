version: '3.8'

# Development overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  postgres:
    ports:
      - "5433:5432"  # Use 5433 on host to avoid conflict with local PostgreSQL
    environment:
      POSTGRES_PASSWORD: safestream_dev

  redis:
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    # No password in dev for simplicity

  minio:
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password

  meilisearch:
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development

  ollama:
    ports:
      - "11434:11434"

  # Web application (optional - can run locally with pnpm dev)
