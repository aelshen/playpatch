version: '3.8'

# Production configuration with Traefik reverse proxy
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.0
    container_name: playpatch-traefik
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Redirect HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - playpatch
    restart: unless-stopped

  # Web Application
  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
      target: production
    container_name: playpatch-web
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://playpatch:${DB_PASSWORD}@postgres:5432/playpatch
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_KEY=${MEILISEARCH_KEY}
      - OLLAMA_URL=http://ollama:11434
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://${DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3030"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - playpatch
    restart: unless-stopped
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # Background Workers
  workers:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.workers
    container_name: playpatch-workers
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://playpatch:${DB_PASSWORD}@postgres:5432/playpatch
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - OLLAMA_URL=http://ollama:11434
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
    volumes:
      - video_processing:/tmp/processing
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - playpatch
    restart: unless-stopped
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # Production settings for services
  postgres:
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}

  redis:
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}

  meilisearch:
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_ENV: production

volumes:
  traefik_letsencrypt:
    name: playpatch_traefik_letsencrypt
